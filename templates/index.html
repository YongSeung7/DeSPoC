<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeSPoC</title>
  <style>
    body {
      font-family: Verdana, sans-serif;
      text-align: left;
      background-color: #FBEFC5;
      width: 1500px; /* 고정된 가로 크기 */
      height: 700px; /* 고정된 세로 크기 */
      margin: 0;
      padding: 0;
      overflow: auto; 
    }

    .container {
      width: 1200px;
      height: 650px;
      background-color: #f7f4eb;
      border-radius: 25px;
      box-shadow: 0 4px 12px rgb(101, 76, 39);
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center; /* 세로 방향 중앙 정렬 */
      padding: 0;
      position: relative;
    }

    .time {
      font-size: 20px;
      color: #747474;
      position: absolute;
      top: 10px; /* 상단에 위치 */
      left:50%;
      transform: translateX(-50%); /* 정확한 중앙 정렬 */
      font-family: Verdana, sans-serif;
      font-weight: bold;
    }

    .button {
      margin: 10px;
      padding: 10px 20px;
      width: 90px;
      height: 70px;
      font-size: 16px;
      cursor: pointer;
      color: white;
      background-color: #f2c3a3;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .button:hover {
      background-color: #e4956d;
    }
    .dotted-box {
      width: 300px;
      height: 120px;
      border: 2px dotted #000000;
      padding: 10px;
      font-size: 13px;
      text-align: left;
      font-weight: bold;
      font-family: 'Gothic', sans-serif;
      background-color: #fff;
      position: absolute; /* 고정 위치 설정 */
      left: 130px; /* 컨테이너의 왼쪽 */
      bottom: 20px; /* 컨테이너의 아래쪽 */
    }

    /* Main Menu */
    #menu {
      display: flex;
      flex-direction: row;
      gap: 10px;
      position: absolute;
      right: 20px;
      bottom: 30px;
    }

    /* Small Box */
    .small-box {
      width: 96.5%;
      height: 58%;
      background-color: #f1e6d4;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      position: relative;
      margin: 0 auto;
      top: -60px;
    }

    /* Heading Style */
    h1 {
      color: #1E90FF;
      font-family: Verdana, sans-serif;
      position: absolute;
      top: 5%;
      width: 100%;
      text-align: center;
      margin-top: 0;
      font-size: 64px;
    }

    /* Image Style */
    img {
      width: 400px;
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      z-index:2;
    }
    .yellow-semi-circle {
      width: 500px;
      height: 250px;
      background-color: rgb(252, 226, 130);
      border-radius: 250px 250px 0 0;
      position: absolute;
      bottom: 0px;
      left: 50%;
      transform: translateX(-50%);
      z-index:1;
    }

    .thick-line{
      width: 550px;
      height: 5px;
      background-color: #000000;
      position: absolute;
      border-radius: 2.5px;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index:3;
    }

    .new-button {
      position: absolute;
      top:10px;
      right:20px;
      padding: 10px 20px;
      background-color: #e57651;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s;
    }
    .new-button:hover {
      background-color: #952f12;
    }


  </style>
</head>
<body>
  <div class="container">
    <!-- 시간 표시 영역 -->
    <div id="time-display" class="time"></div>

    <div class="dotted-box">
      오랜 기간 앉아있는 경우 에너지의 소비량은 적고, 같은 자세를 계속 유지해야 하기 때문에 상당한 피곤을 느끼고, 척추건강에 이상이 생길 수 있습니다.<br><br>
      DeSPoC은 사용자의 이용시간과 자세를 감지하여 자세를 바로잡을 수 있도록 스트레칭 가이드를 제공하여 사용자의 생활 패턴을 개선합니다.
    </div>
    <div class="small-box">
      <h1>DeSPoC</h1>

      <div class="thick-line"></div>

      <!-- Image at the bottom of small-box -->
      <img src="{{ url_for('static', filename='stretch_icon.png') }}" alt="Stretch Icon">

      <div class="yellow-semi-circle"></div>

    </div>

    <!-- Main Menu -->
    <div id="menu">
        <a href="/_video" class="button">Video</a>
        <a href="/_database" class="button">Database</a>
        <a href="/_current-posture" class="button">Current<br>Posture</a>
    </div>

    <button class="new-button">X</button>

    <script>
      //   setTimeout(function() {
      //   window.location.href = "/_video"; // 1분 후 비디오 페이지로 이동
      // }, 60000); // 60000ms = 1분

      function fetchData() {
        fetch('/get_data')  // Flask 서버의 /get_data 엔드포인트 호출
          .then(response => response.json())  // JSON 응답 파싱
          .then(data => {
            const totalSeconds = Math.floor(data.time);
            const emptyFlag = data.empty_flag;
            if(emptyFlag === 0){
              const hours = Math.floor(totalSeconds / 3600);
              const minutes = Math.floor((totalSeconds % 3600)/60);
              const seconds = totalSeconds % 60;

              const timeString =
                "착석 시간 - "+
                String(hours).padStart(2,'0')+':'+
                String(minutes).padStart(2,'0')+':'+
                String(seconds).padStart(2,'0');

                document.getElementById('time-display').textContent = timeString;

            }
            else{
              document.getElementById('time-display').textContent = "자리에 착석해주세요";
            }
            
          // 60초 간격으로 비디오 페이지로 이동
          if (totalSeconds > 0 && totalSeconds % 60 === 0) {
            //window.location.href = "/_video";
            alert("스트레칭 시간입니다!!!!!!")
          }
            
           
          })
          .catch(error => console.error('Error fetching data:', error));
      }
    
      // 1초마다 서버에서 데이터 요청
      setInterval(fetchData, 1000);
    </script>

</body>
</html>
