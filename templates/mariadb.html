<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Charts</title>
  <style>
    body {
      font-family: Verdana, sans-serif;
      text-align: left;
      background-color: #FBEFC5;
      margin: 0;
      padding: 0;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: white;
      width: 70%;
      margin: 20px auto;
      padding: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      position: relative;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: bold;
    }
    .button {
      position: absolute;
      right: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      color: white;
      background-color: #f2c3a3;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s;
    }
    .button:hover {
      background-color: #e4956d;
    }
    .chart-container {
      margin: 20px auto;
      width: 80%;
      text-align: center;
      padding: 20px;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .chart-title {
      font-size: 18px;
      margin-bottom: 10px;
    }
    canvas {
      display: block;
      margin: 0 auto;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>최근 7번 사용 간 자세 데이터</h1>
    <a href="/" class="button">Back to Menu</a>
  </header>

  <div class="chart-container">
    <div class="chart-title">경추 각도 추이</div>
    <canvas id="neckChart" width="800" height="400"></canvas>
  </div>
  
  <div class="chart-container">
    <div class="chart-title">위험 자세 판단 횟수</div>
    <canvas id="stackedBarChart1" width="800" height="400"></canvas>
  </div>
  
  <div class="chart-container">
    <div class="chart-title">좌우 하중 비율 추이</div>
    <canvas id="stackedBarChart2" width="800" height="400"></canvas>
  </div>
  
  <script>
    // Flask에서 전달된 데이터
    const neckAvgData = JSON.parse('{{ neck_avg_data | tojson | safe }}');
    const fieldsData = JSON.parse('{{ fields_data | tojson | safe }}');
    const weightData = JSON.parse('{{ weight_data | tojson | safe }}');

    const labels = ['7th Data', '6th Data', '5th Data', '4th Data', '3rd Data', '2nd Data', '1st Data'];

    // 꺾은선 차트 생성
    const neckCtx = document.getElementById('neckChart').getContext('2d');
    new Chart(neckCtx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Neck Average',
          data: neckAvgData,
          borderColor: 'rgba(75, 192, 192, 1)',
          backgroundColor: 'rgba(75, 192, 192, 0.2)',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true },
          tooltip: { callbacks: { label: (context) => `Value: ${context.raw}` } }
        },
        scales: {
          x: { display: true },
          y: { title: { display: true, text: 'Neck Angle' } }
        }
      }
    });

    // 누적형 막대 차트 1 생성
    const stackedCtx1 = document.getElementById('stackedBarChart1').getContext('2d');
    new Chart(stackedCtx1, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          { label: 'LlegCnt', data: fieldsData.LlegCnt, backgroundColor: 'rgba(255, 99, 132, 0.8)' },
          { label: 'RlegCnt', data: fieldsData.RlegCnt, backgroundColor: 'rgba(54, 162, 235, 0.8)' },
          { label: 'L_UnbalCnt', data: fieldsData.L_UnbalCnt, backgroundColor: 'rgba(255, 206, 86, 0.8)' },
          { label: 'R_UnbalCnt', data: fieldsData.R_UnbalCnt, backgroundColor: 'rgba(75, 192, 192, 0.8)' },
          { label: 'BendCnt', data: fieldsData.BendCnt, backgroundColor: 'rgba(153, 102, 255, 0.8)' }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true },
          tooltip: { callbacks: { label: (context) => `Value: ${context.raw}` } }
        },
        scales: {
          x: { stacked: true, display: true },
          y: { stacked: true, title: { display: true, text: 'Count' } }
        }
      }
    });

    // 누적형 막대 차트 2 생성
    const stackedCtx2 = document.getElementById('stackedBarChart2').getContext('2d');
    new Chart(stackedCtx2, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          { label: 'Rweight', data: weightData.Rweight, backgroundColor: 'rgba(255, 159, 64, 0.8)' },
          { label: 'Lweight', data: weightData.Lweight, backgroundColor: 'rgba(75, 192, 192, 0.8)' }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true },
          tooltip: { callbacks: { label: (context) => `Value: ${context.raw}` } }
        },
        scales: {
          x: { stacked: true, display: true },
          y: { stacked: true, title: { display: true, text: 'Weight' } }
        }
      }
    });
   
    function fetchData() {
        fetch('/get_data')  // Flask 서버의 /get_data 엔드포인트 호출
          .then(response => response.json())  // JSON 응답 파싱
          .then(data => {
            const totalSeconds = Math.floor(data.time);
            const emptyFlag = data.empty_flag;
            if(emptyFlag === 0){
              const hours = Math.floor(totalSeconds / 3600);
              const minutes = Math.floor((totalSeconds % 3600)/60);
              const seconds = totalSeconds % 60;

              // const timeString =
              //   "착석 시간 - "+
              //   String(hours).padStart(2,'0')+':'+
              //   String(minutes).padStart(2,'0')+':'+
              //   String(seconds).padStart(2,'0');

                //document.getElementById('time-display').textContent = timeString;

            }
            // else{
            //   document.getElementById('time-display').textContent = "자리에 착석해주세요";
            // }
            
          // 60초 간격으로 비디오 페이지로 이동
          if (totalSeconds > 0 && totalSeconds % 60 === 0) {
            //window.location.href = "/_video";
            alert("스트레칭 시간입니다!!!!!!")
          }
            
           
          })
          .catch(error => console.error('Error fetching data:', error));
      }
    
      // 1초마다 서버에서 데이터 요청
      setInterval(fetchData, 1000);
  </script>
</body>
</html>
