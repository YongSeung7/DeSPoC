  <script>
   // HUE 값을 압력 값으로 변환하는 함수
function pressureToHue(pressure) {
  if (pressure >= 220) {
    return 0; // 최대값은 HUE=0
  }
  return 180 - (pressure * 180 / 220); // 공식 적용
}

// HUE 값을 RGB로 변환하는 함수
function hueToRgb(hue) {
  const s = 1; // 채도
  const l = 0.5; // 명도

  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
  const m = l - c / 2;

  let r = 0,
    g = 0,
    b = 0;

  if (hue >= 0 && hue < 60) {
    r = c;
    g = x;
    b = 0;
  } else if (hue >= 60 && hue < 120) {
    r = x;
    g = c;
    b = 0;
  } else if (hue >= 120 && hue < 180) {
    r = 0;
    g = c;
    b = x;
  } else if (hue >= 180 && hue < 240) {
    r = 0;
    g = x;
    b = c;
  } else if (hue >= 240 && hue < 300) {
    r = x;
    g = 0;
    b = c;
  } else if (hue >= 300 && hue <= 360) {
    r = c;
    g = 0;
    b = x;
  }

  // RGB를 [0, 255] 범위로 변환
  r = Math.round((r + m) * 255);
  g = Math.round((g + m) * 255);
  b = Math.round((b + m) * 255);

  return `rgb(${r}, ${g}, ${b})`;
}
// 서버에서 데이터를 가져오는 함수
async function fetchDataFromServer() {
  try {
    // Flask 서버의 특정 엔드포인트에서 JSON 데이터를 가져옴
    const response = await fetch("/get_posture_data");
    if (!response.ok) {
      throw new Error("Failed to fetch data from server");
    }
    const data = await response.json(); // JSON 데이터를 파싱
    return data;
  } catch (error) {
    console.error("Error fetching data:", error);
    return null; // 오류 시 빈 배열 또는 null 반환
  }
}

    

// 각 바에 데이터를 추가하고 색상을 설정하는 함수
function createBlocks(barId, data) {
  const bar = document.getElementById(barId);
  bar.innerHTML = ""; // 기존 블록 제거

  data.forEach((pressure) => {
    const block = document.createElement("div");
    block.classList.add("block");

    // 압력 값에 따라 HUE 계산 및 색상 설정
    const hue = pressureToHue(pressure);
    const color = hueToRgb(hue);
    block.style.backgroundColor = color;

    // 바에 블록 추가
    bar.appendChild(block);
  });
}

// 데이터 갱신 및 UI 업데이트 함수
async function updateBars() {
  const data = await fetchDataFromServer();
  if (data) {
    const bar1Data = [data[10], data[12], data[14], data[16], data[18], data[20]];
    const bar2Data = [data[5], data[6], data[7], data[8], data[9], data[11], data[13], data[15], data[17], data[19], data[21], data[22], data[23], data[24], data[25]];
    const bar3Data = [data[0], data[1], data[2], data[3], data[4], data[26], data[27], data[28], data[29], data[30]];

    // 블록 업데이트
    createBlocks("bar1", bar1Data);
    createBlocks("bar2", bar2Data);
    createBlocks("bar3", bar3Data);
  }
}

function sum(array) {
  return array.reduce((acc, val) => acc + val, 0);
}

    } else if (data[35] == 5) {

  }
    else {

}
