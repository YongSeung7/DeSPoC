<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stretching Video</title>
  <style>
    body {
      font-family: Verdana, sans-serif;
      text-align: left;
      background-color: #FBEFC5;
      width: 1500px;
      height: 700px;
      margin: 0;
      padding: 0;
      overflow: auto;
    }

    .container {
      width: 1200px;
      height: 650px;
      background-color: #f7f4eb;
      border-radius: 25px;
      box-shadow: 0 4px 12px rgb(101, 76, 39);
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      position: relative;
    }

   .title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 { 
      color: #1E90FF;
      font-family: Verdana, sans-serif;
      font-size: 36px;
      margin: 10px 0;
    }
    
    h2 {
      color: black;
      font-family: Verdana, sans-serif;
      font-size: 36px;
      margin: 10px 0;
    }

    img {
      width: 36px;
      left: 50%;
      transform: translateX(-50%);
      margin: 20px;
    }

    .yellow-semi-circle {
      width: 40px;
      height: 20px;
      background-color: rgb(252, 226, 130);
      border-radius: 20px 20px 0 0;
      margin: -84.5px;
    }

    .small-box {
      width: 96.5%;
      height: 80%;
      background-color: #f1e6d4;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      margin: 0 auto;
      margin-bottom: 3px;
    }

    iframe {
      width: 800px;
      height: 450px;
      border: none;
    }

    /* 버튼 스타일 */
    .button {
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      color: white;
      background-color: #f2c3a3;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s;
      margin: 0 5px;
    }

    .button-back-to-menu{
      margin: 10px;
      padding: 10px 20px;
      width: 110px;
      height: 30px;
      font-size: 16px;
      cursor: pointer;
      color: white;
      background-color: #f2c3a3;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .button:hover {
      background-color: #e4956d;
    }

    /* 버튼 그룹 스타일 */
    .button-group {
      position: relative;
      margin-bottom: 10px;
      display: flex;
      gap: 5px;
      justify-content: center;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="title">
      <h1>DeSPoC</h1> 
      <h2>Stretching Video</h2>
      <img src="{{ url_for('static', filename='stretch_icon.png') }}" alt="Stretch Icon">
      <div class="yellow-semi-circle"></div>
    </div>
    <div class="small-box">
      <!-- 버튼 그룹 -->
      <div class="button-group">
        <button class="button" onclick="loadVideo('8nqNVE6uL44')">Video 1</button>
        <button class="button" onclick="loadVideo('yTJFT4FmRFY')">Video 2</button>
        <button class="button" onclick="loadVideo('5fnEEzi_ev0')">Video 3</button>
        <button class="button" onclick="loadVideo('FF0X1m2h7XQ')">Video 4</button>
        <button class="button" onclick="loadVideo('FJ2DWFN5IsA')">Video 5</button>
        <button class="button" onclick="loadVideo('_tzyFMgR8yk')">Video 6</button>
      </div>
      <iframe id="videoIframe" frameborder="0" allowfullscreen></iframe>
    </div>

    <!-- Back to Menu 버튼 -->
    <a href="/" class="button-back-to-menu">Back to Menu</a>

    <script>
      // 기본 비디오 ID 설정
      var videoId = "8nqNVE6uL44";
      document.getElementById('videoIframe').src = "https://www.youtube.com/embed/" + videoId;

      // 새로운 비디오를 로드하는 함수
      function loadVideo(id) {
        document.getElementById('videoIframe').src = "https://www.youtube.com/embed/" + id;
      }
    </script>
  </div>
</body>
</html>
